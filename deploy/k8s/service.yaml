apiVersion: v1
kind: Service
metadata:
  name: carbone
  labels:
    app.kubernetes.io/name: carbone
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: carbone
  ports:
    # port 4000 -> targetPort "http" = the corp-proxy sidecar (8080), which proxies to carbone:4000.
    - name: http
      port: 4000
      targetPort: http
