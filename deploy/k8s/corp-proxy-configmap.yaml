# nginx sidecar config: carbone-ee sets Cross-Origin-Resource-Policy: same-origin, which
# blocks embedding the Studio JS into Odoo cross-origin. This proxies everything to
# carbone (127.0.0.1:4000) and forces CORP: cross-origin so the embedded studio can load.
apiVersion: v1
kind: ConfigMap
metadata:
  name: carbone-corp-proxy
  labels:
    app.kubernetes.io/name: carbone
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    server {
        listen 8080;
        client_max_body_size 100m;
        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            # carbone-ee sets CORP same-origin -> strip it and force cross-origin
            proxy_hide_header Cross-Origin-Resource-Policy;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }
    }
